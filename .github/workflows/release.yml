name: Release
run-name: Release ${{ github.ref_name }}
on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+*"
env:
    GO_VERSION: "1.25.6"
    NODE_VERSION: 22
    NODE_OPTIONS: --max-old-space-size=4096
jobs:
    build-app:
        strategy:
            matrix:
                include:
                    - platform: "darwin"
                      runner: "macos-latest"
                    - platform: "linux"
                      runner: "ubuntu-latest"
                    - platform: "windows"
                      runner: "windows-latest"
        runs-on: ${{ matrix.runner }}
        steps:
            - uses: actions/checkout@v4
            - name: Install Linux Build Dependencies
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install --no-install-recommends -y libarchive-tools libopenjp2-tools rpm squashfs-tools
            - name: Install Zig (not Mac)
              if: matrix.platform != 'darwin'
              uses: mlugg/setup-zig@v2
            - name: Install FPM (not Windows)
              if: matrix.platform != 'windows'
              run: sudo gem install fpm
            - name: Install FPM (Windows only)
              if: matrix.platform == 'windows'
              run: gem install fpm
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{env.GO_VERSION}}
                  cache-dependency-path: go.sum
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{env.NODE_VERSION}}
                  cache: npm
                  cache-dependency-path: package-lock.json
            - name: Force git deps to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:
            - name: npm ci
              run: npm ci --no-audit --no-fund
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"
            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
            - name: Build
              run: task package
              env:
                  USE_SYSTEM_FPM: true
              shell: bash
            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.platform }}-artifacts
                  path: make/

    create-release:
        runs-on: ubuntu-latest
        needs: build-app
        permissions:
            contents: write
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  name: Wave Terminal ${{ github.ref_name }}
                  generate_release_notes: true
                  draft: false
                  files: |
                      artifacts/*.zip
                      artifacts/*.dmg
                      artifacts/*.exe
                      artifacts/*.msi
                      artifacts/*.rpm
                      artifacts/*.deb
                      artifacts/*.AppImage
